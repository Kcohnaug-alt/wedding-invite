<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andrew & Sheryn</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #fffaf7;
    color: #333;
}

.section {
    padding: 60px 20px;
    text-align: center;
}

.hero {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486') center/cover;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    margin: 0;
}

.hero p {
    font-size: 20px;
    margin-top: 10px;
}

.details {
    font-size: 18px;
    line-height: 1.8;
}

.btn {
    display: inline-block;
    padding: 14px 28px;
    background: #c9a96e;
    color: white;
    text-decoration: none;
    border-radius: 30px;
    margin-top: 20px;
}

.gallery img {
    width: 30%;
    margin: 10px;
    border-radius: 10px;
}

@media (max-width: 768px) {
    .gallery img {
        width: 90%;
    }
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>Andrew & Sheryn</h1>
    <p>We’re Getting Married</p>
</div>

<!-- DETAILS -->
<div class="section">
    <h2>Wedding Details</h2>
    <div class="details">
        <p>📅 12 September 2026</p>
        <p>🕕 6:00 PM</p>
        <p>📍 Kuala Lumpur</p>
    </div>
</div>

<!-- MAP -->
<div class="section">
    <h2>Location</h2>
    <iframe 
        src="https://maps.google.com/maps?q=Kuala%20Lumpur&t=&z=13&ie=UTF8&iwloc=&output=embed"
        width="90%" height="300" style="border:0;">
    </iframe>
</div>

<!-- GALLERY -->
<div class="section gallery">
    <h2>Our Moments</h2>
    <img src="https://images.unsplash.com/photo-1520854221256-17451cc331bf">
    <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
    <img src="https://images.unsplash.com/photo-1504208434309-cb69f4fe52b0">
</div>

<!-- RSVP -->
<div class="section">
    <h2>RSVP</h2>
    <p>Please confirm your attendance</p>

    <!-- Replace with your Google Form -->
    <a href="YOUR_GOOGLE_FORM_LINK" target="_blank" class="btn">
        RSVP Now
    </a>
</div>

</body>
</html>
